<div class="fudis-form-element fudis-text-area fudis-text-area__{{ size }}">
	<fudis-label
		[id]="'label_' + id"
		[for]="id"
		[text]="label"
		[requiredText]="control.hasValidator(requiredValidator) && requiredText ? requiredText : null">
	</fudis-label>
	<textarea
		id="{{ id }}"
		[formControl]="control"
		class="fudis-text-area__textarea"
		[ngClass]="{ 'fudis-text-area--invalid': control.touched && control.invalid }"
		[attr.aria-labelledby]="'label_' + id"
		[attr.aria-describedby]="'guidance_' + id"
		[attr.minLength]="minLength ? minLength : null"
		[attr.maxLength]="maxLength ? maxLength : null"
		[attr.required]="control.hasValidator(requiredValidator)">
	</textarea>
	<fudis-guidance
		[maxLength]="maxLength"
		[helpText]="helpText"
		[id]="'guidance_' + id"
		[errorMsg]="errorMsg"
		[control]="control">
	</fudis-guidance>
</div>
