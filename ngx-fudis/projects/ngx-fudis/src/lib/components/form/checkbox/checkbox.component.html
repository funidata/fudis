<div class="fudis-checkbox">
  <label
    [attr.for]="id"
    class="fudis-checkbox__label"
    [class.fudis-checkbox__label--disabled]="_disabled()"
  >
    <input
      type="checkbox"
      class="fudis-checkbox__input"
      [id]="id"
      [formControl]="control"
      [checked]="_value()"
      [attr.aria-disabled]="_disabled()"
      [attr.aria-required]="_required | async"
      [attr.aria-describedby]="ariaDescribedBy"
      [attr.aria-labelledby]="ariaLabelledBy"
      [attr.tabindex]="_disabled() ? -1 : null"
      [attr.aria-invalid]="(_touched() && _invalid()) || null"
      (focus)="_onFocus()"
      (blur)="_onBlur()"
      (change)="_onChange($event)"
    />
    <div
      class="fudis-checkbox__content"
      [class.fudis-checkbox__content__disabled]="_disabled()"
    >
      <div class="fudis-checkbox__content-wrapper">
        <span
          class="fudis-checkbox__content__box"
          [class.fudis-checkbox__content__box--focused]="_focused"
          [class.fudis-checkbox__content__box--invalid]="(_touched() && _invalid()) || null"
          [class.fudis-checkbox__content__box--disabled]="_disabled()"
        >
          @if (_value()) {
            <fudis-icon [icon]="'check'" class="fudis-checkbox__content__box__icon" />
          }
        </span>
      </div>
    </div>
    @if (label) {
      <span class="fudis-checkbox__label__text">{{ label }}</span>
    }
  </label>
  <ng-content></ng-content>
  @if (this._required | async) {
    <span class="fudis-checkbox__required"
      >({{ _translationService.getTranslations()().REQUIRED }})</span
    >
  }
</div>
