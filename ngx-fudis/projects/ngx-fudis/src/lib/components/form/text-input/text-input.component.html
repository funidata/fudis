<div class="fudis-form-element fudis-text-input fudis-text-input__{{ size }}">
	<fudis-label
		[for]="id"
		[text]="label"
		[id]="'label_' + id"
		[requiredText]="control.hasValidator(requiredValidator) && requiredText ? requiredText : null">
	</fudis-label>
	<input
		#fudisTextInput
		[formControl]="control"
		[attr.minlength]="minLength"
		[attr.maxlength]="maxLength"
		[attr.min]="minNumber"
		[attr.max]="maxNumber"
		id="{{ id }}"
		[type]="type"
		[ngClass]="{ 'fudis-text-input__input--invalid': control.touched && control.invalid }"
		class="fudis-text-input__input"
		[attr.aria-labelledby]="'label_' + id"
		[attr.aria-describedby]="'guidance_' + id"
		[attr.required]="control.hasValidator(requiredValidator)" />
	<fudis-guidance
		[helpText]="helpText"
		[id]="'guidance_' + id"
		[errorMsg]="errorMsg"
		[control]="control"></fudis-guidance>
</div>
