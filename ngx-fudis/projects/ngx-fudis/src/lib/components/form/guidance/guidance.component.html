<div [id]="id" class="fudis-guidance">
	<ng-container *ngIf="checkErrors()">
		<ng-container *ngFor="let error of errorMsgToShow">
			<fudis-error-message [message]="error"></fudis-error-message>
		</ng-container>
	</ng-container>
	<p *ngIf="!showError && helpText" class="fudis-guidance__help-text">{{ helpText }}</p>
	<small
		class="fudis-guidance__character-limit-indicator"
		[ngClass]="{ 'fudis-guidance__character-limit-indicator__float-right': !helpText }"
		*ngIf="maxLength">
		{{ control.value.length || 0 }}/{{ maxLength }}
	</small>
</div>
