name: Publish documentation from PR

on:
  # Must be run for pushes to associate deployment with PR. Otherwise docs link is not shown.
  push:
    # Required to avoid triggering on automatic release tags.
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpushbranchestagsbranches-ignoretags-ignore
    branches-ignore:
      - main
      - "release-**"
      - "dependabot/**"

jobs:
  publish:
    name: Publish docs to AWS
    runs-on: ubuntu-24.04
    permissions:
      content: read
      deployments: write
    # Native GitHub deployment object + status checks are used to show deployment status and link to docs in PR UI.
    environment:
      name: Documentation for branch ${{ github.ref_name }}
      url: https://fudis.funidata.fi/ngx/branch/${{ github.ref_name }}/index.html
    defaults:
      run:
        working-directory: ngx-fudis
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Install dependencies
        run: npm ci
      - name: Build docs
        run: npm run build-storybook
      - name: Copy docs to S3 bucket
        run: aws s3 sync static s3://${{ secrets.AWS_S3_BUCKET_NAME }}/ngx/branch/${{ github.ref_name }} --delete --cache-control max-age=5
